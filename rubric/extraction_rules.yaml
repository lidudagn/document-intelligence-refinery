triage:
  page_sampling:
    first_n: 5
    mid_n: 5
    last_n: 5
  thresholds:
    char_density_native_threshold: 0.001
    scanned_page_ratio_threshold: 0.70
    native_page_ratio_threshold: 0.70
    mixed_lower_bound: 0.30
    table_heavy_page_ratio: 0.40
    figure_heavy_page_ratio: 0.40
    column_gap_tolerance_pts: 100
    routing_origin_threshold: 0.60
    routing_layout_threshold: 0.70
    domain_activation_threshold: 10
  domains:
    financial:
      revenue: 5
      fiscal: 5
      balance sheet: 5
      tax expenditure: 4
      income statement: 5
      audit: 3
    legal:
      whereas: 5
      hereby: 4
      jurisdiction: 5
      affidavit: 5
      plaintiff: 5
      statute: 3
    technical:
      architecture: 4
      protocol: 4
      latency: 5
      system design: 5
      api: 4
      bandwidth: 3
    medical:
      patient: 5
      diagnosis: 5
      clinical: 4
      symptoms: 4
      treatment: 3
      syndrome: 5

extraction:
  fast_text:
    min_page_confidence_score: 0.65
  vision:
    max_usd_per_document: 0.10
    budget_warning_threshold: 0.08
  routing:
    escalate_on_confidence_below: 0.65

chunking:
  max_tokens_per_chunk: 512
  enforce_rules: true
  constitution:
    - name: tables_must_not_split
      description: Table rows and headers must remain in the same LDU
    - name: figures_must_include_caption
      description: Figure captions must be stored with their parent figure chunk
    - name: list_items_grouped
      description: Consecutive list items are grouped until token limit
    - name: headers_propagate_to_children
      description: Section headers propagate as metadata to child chunks
    - name: preserve_spatial_order
      description: Blocks must be chunked following page reading order

vector_store:
  engine: chromadb
  embedding_model: all-MiniLM-L6-v2
